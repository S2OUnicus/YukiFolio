<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#c2a384">
  <title>オフライン | ゆきフォリオ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --card: #ffffff;
      --text: #3f3027;
      --sub: #756457;
      --accent: #c2a384;
      --border: #eadfce;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    main {
      width: min(100%, 560px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(77, 52, 30, 0.08);
      text-align: center;
    }
    img {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.5rem;
    }
    p {
      margin: 0 0 10px;
      line-height: 1.7;
      color: var(--sub);
    }
    a {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>

        <link rel="manifest" href="manifest.webmanifest" />
        <link rel="apple-touch-icon" href="image/icons/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="mobile-web-app-capable" content="yes" />
    
    <link rel="stylesheet" href="css/pwa-ui.css" />
</head>
<body>
  <main>
    <img src="./image/icons/icon-192.png" alt="ゆきフォリオ アイコン">
    <h1>現在オフラインです</h1>
    <p>このページはネットワーク接続がないため表示できませんでした。</p>
    <p>一度表示済みのページや画像は、接続回復後に再度アクセスするとキャッシュされます。</p>
    <a href="./index.html">トップへ戻る</a>
  </main>

    <script src="js/pwa-enhancements.js" defer data-pwa-root="./"></script>
</body>
</html>

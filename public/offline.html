<!DOCTYPE html>
<html lang="ja">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="theme-color" content="#c2a384">
		<title>オフラインです | ゆきフォリオ</title>
		<link rel="icon" href="./favicon.ico">
		<link rel="apple-touch-icon" href="./image/icons/apple-touch-icon.png">
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				background: linear-gradient(180deg, #f8f1ea, #fffaf5);
				color: #3a2b1d;
				padding: 24px;
			}

			.card {
				width: min(100%, 640px);
				background: rgba(255, 255, 255, 0.92);
				border: 1px solid rgba(194, 163, 132, 0.28);
				border-radius: 22px;
				box-shadow: 0 16px 40px rgba(60, 40, 20, 0.08);
				padding: 28px;
				text-align: center;
			}

			img {
				width: 96px;
				height: 96px;
				border-radius: 22px;
			}

			h1 {
				margin: 16px 0 10px;
				font-size: 1.55rem;
			}

			p {
				line-height: 1.7;
				margin: 10px 0;
			}

			.actions {
				display: flex;
				gap: 12px;
				justify-content: center;
				flex-wrap: wrap;
				margin-top: 20px;
			}

			a {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				min-width: 180px;
				padding: 12px 18px;
				border-radius: 999px;
				text-decoration: none;
				font-weight: 700;
				border: 1px solid #c2a384;
				color: #5d3f20;
				background: #fff;
			}

			a.primary {
				background: #c2a384;
				color: #fff;
			}

		</style>
	</head>

	<body>
		<main class="card">
			<img src="./image/icons/icon-192.png" alt="ゆきフォリオ アイコン">
			<h1>現在オフラインです</h1>
			<p>以前アクセスしたページや画像はキャッシュから表示できる場合があります。</p>
			<p>ネットワーク接続を確認してから再読み込みしてください。</p>
			<div class="actions">
				<a class="primary" href="./">トップへ戻る</a>
				<a href="javascript:location.reload()">再読み込み</a>
			</div>
		</main>
	</body>

</html>
